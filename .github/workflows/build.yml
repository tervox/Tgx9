name: Build & Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Tgx9 (our modifications)
        uses: actions/checkout@v4
        with:
          path: tgx9-mods

      - name: Clone original Telegram-X with all submodules
        run: |
          git clone --recurse-submodules \
            https://github.com/TGX-Android/Telegram-X.git tgx

      - name: Apply our modifications
        run: |
          cp tgx9-mods/app/src/main/java/org/thunderdog/challegram/component/attach/MediaBottomGalleryController.java \
             tgx/app/src/main/java/org/thunderdog/challegram/component/attach/
          cp tgx9-mods/app/src/main/java/org/thunderdog/challegram/component/attach/MediaBottomFilesController.java \
             tgx/app/src/main/java/org/thunderdog/challegram/component/attach/
          # Add btn_showInFiles ID
          sed -i 's|<item type="id" name="btn_showAdvanced" />|<item type="id" name="btn_showAdvanced" />\n  <item type="id" name="btn_showInFiles" />|' \
            tgx/app/src/main/res/values/ids.xml
          # Add OpenSystemFilePicker string
          sed -i 's|<string name="NoFilePicker">.*</string>|&\n  <string name="OpenSystemFilePicker">Open file picker</string>|' \
            tgx/app/src/main/res/values/strings.xml
          # Fix tgcalls libs: set ARCHIVE_OUTPUT_DIRECTORY so lld can find them
          for lib in usrsctp srtp openh264 absl tgcalls webrtc rnnoise tgvoip json11; do
            cmake_file=$(grep -rl "add_library($lib STATIC" tgx/app/jni/tgvoip/)
            if [ -n "$cmake_file" ]; then
              sed -i "s|add_library($lib STATIC|set_target_properties($lib PROPERTIES ARCHIVE_OUTPUT_DIRECTORY tgcalls)\nadd_library($lib STATIC|" "$cmake_file"
            fi
          done

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;23.2.8568313" \
            "cmake;3.22.1" || true
          # Install NDK sources needed for cpu-features.h
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk-bundle" || true
          # Copy cpu-features.h if not in expected location
          NDK_DIR="$ANDROID_SDK_ROOT/ndk/23.2.8568313"
          CPU_DIR="$NDK_DIR/sources/android/cpufeatures"
          mkdir -p "$CPU_DIR"
          if [ ! -f "$CPU_DIR/cpu-features.h" ]; then
            # Download from NDK GitHub
            curl -sL "https://raw.githubusercontent.com/android/ndk/master/sources/android/cpufeatures/cpu-features.h" \
              -o "$CPU_DIR/cpu-features.h" || true
            curl -sL "https://raw.githubusercontent.com/android/ndk/master/sources/android/cpufeatures/cpu-features.c" \
              -o "$CPU_DIR/cpu-features.c" || true
          fi

      - name: Create local.properties
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > tgx/local.properties
          printf 'telegram.api_id=2040\n' >> tgx/local.properties
          printf 'telegram.api_hash=b18441a1ff607e10a989891a5462e627\n' >> tgx/local.properties
          printf 'app.id=org.thunderdog.challegram\n' >> tgx/local.properties
          printf 'app.name=Telegram X\n' >> tgx/local.properties
          printf 'app.download_url=https://t.me/tgx_android\n' >> tgx/local.properties
          printf 'app.disable_signing=true\n' >> tgx/local.properties
          printf 'tgx.extension=none\n' >> tgx/local.properties

      - name: Install build dependencies
        run: sudo apt-get install -y yasm nasm pkg-config

      - name: Build native libraries (libvpx + ffmpeg)
        run: |
          cd tgx
          chmod +x scripts/*.sh scripts/private/*.sh
          export THIRDPARTY_LIBRARIES="$(pwd)/app/jni/third_party"
          export SED="sed"
          export STYLE_END="" STYLE_ERROR="" STYLE_WARN="" STYLE_INFO=""
          bash scripts/private/patch-opus-impl.sh
          bash scripts/private/patch-androidx-media-impl.sh
          chmod +x ../tgx9-mods/build_native.sh
          bash ../tgx9-mods/build_native.sh

      - name: Fix gradlew
        run: |
          cd tgx
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

      - name: Build APK
        run: |
          cd tgx
          ./gradlew assembleLegacyArm32Debug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tgx9-debug
          path: tgx/app/build/outputs/apk/**/*.apk
