name: Build & Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Tgx9 (our modifications)
        uses: actions/checkout@v4
        with:
          path: tgx9-mods

      - name: Clone original Telegram-X with all submodules
        run: |
          git clone --recurse-submodules \
            https://github.com/TGX-Android/Telegram-X.git tgx

      - name: Apply our modifications
        run: |
          cp tgx9-mods/app/src/main/java/org/thunderdog/challegram/component/attach/MediaBottomGalleryController.java \
             tgx/app/src/main/java/org/thunderdog/challegram/component/attach/
          cp tgx9-mods/app/src/main/java/org/thunderdog/challegram/component/attach/MediaBottomFilesController.java \
             tgx/app/src/main/java/org/thunderdog/challegram/component/attach/
          cp tgx9-mods/app/src/main/java/org/thunderdog/challegram/telegram/UploadNotificationManager.java \
            tgx/app/src/main/java/org/thunderdog/challegram/telegram/
          # Fix tgcalls libs
          sed -i '2a set(CMAKE_ARCHIVE_OUTPUT_DIRECTORY ${CMAKE_CURRENT_BINARY_DIR}/../tgcalls)' \
            tgx/app/jni/tgvoip/CMakeLists.txt
          # Add strings and IDs via Python (reliable, no sed anchor issues)
          python3 tgx9-mods/patch_files.py
          # Upload notification hook
          python3 tgx9-mods/patch_tdlib.py
          # Rate limiting: delay between sends + flood wait retry
          python3 tgx9-mods/patch_messages.py

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;23.2.8568313" \
            "cmake;3.22.1" || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk-bundle" || true
          NDK_DIR="$ANDROID_SDK_ROOT/ndk/23.2.8568313"
          CPU_DIR="$NDK_DIR/sources/android/cpufeatures"
          mkdir -p "$CPU_DIR"
          if [ ! -f "$CPU_DIR/cpu-features.h" ]; then
            curl -sL "https://raw.githubusercontent.com/android/ndk/master/sources/android/cpufeatures/cpu-features.h" \
              -o "$CPU_DIR/cpu-features.h" || true
            curl -sL "https://raw.githubusercontent.com/android/ndk/master/sources/android/cpufeatures/cpu-features.c" \
              -o "$CPU_DIR/cpu-features.c" || true
          fi

      - name: Create local.properties
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > tgx/local.properties
          printf 'telegram.api_id=39028426\n' >> tgx/local.properties
          printf 'telegram.api_hash=e815e4f8345295f5d21b4612b17af3b4\n' >> tgx/local.properties
          printf 'app.id=org.thunderdog.challegram\n' >> tgx/local.properties
          printf 'app.name=TelegramX Mod\n' >> tgx/local.properties
          printf 'app.download_url=https://t.me/tgx_android\n' >> tgx/local.properties
          printf 'app.disable_signing=true\n' >> tgx/local.properties
          printf 'tgx.extension=none\n' >> tgx/local.properties

      - name: Install build dependencies
        run: sudo apt-get install -y yasm nasm pkg-config

      - name: Build native libraries (libvpx + ffmpeg)
        run: |
          cd tgx
          chmod +x scripts/*.sh scripts/private/*.sh
          export THIRDPARTY_LIBRARIES="$(pwd)/app/jni/third_party"
          export SED="sed"
          export STYLE_END="" STYLE_ERROR="" STYLE_WARN="" STYLE_INFO=""
          bash scripts/private/patch-opus-impl.sh
          bash scripts/private/patch-androidx-media-impl.sh
          chmod +x ../tgx9-mods/build_native.sh
          bash ../tgx9-mods/build_native.sh

      - name: Fix gradlew
        run: |
          cd tgx
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

      - name: Build APK
        run: |
          cd tgx
          ./gradlew assembleLegacyArm32Release --stacktrace

      - name: Sign APK
        run: |
          APK=$(find tgx/app/build/outputs/apk -name "*.apk" | head -1)
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)
          $BUILD_TOOLS/apksigner sign --ks tgx9-mods/minha-chave.jks --ks-pass pass:senha123 --ks-key-alias tgx --key-pass pass:senha123 --out signed.apk "$APK"
          cp signed.apk "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tgx9-debug
          path: tgx/app/build/outputs/apk/**/*.apk
